name: Deploy na GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalacja zależności
        run: npm ci

      # Konfiguracja Supabase jest wkompilowana w src/lib/supabaseClient.ts
      # (anon key jest publiczny — chroni nas RLS), więc build nie wymaga sekretów.
      - name: Build
        run: npm run build

      # Publikacja dist/ na gałąź gh-pages — GitHub Pages włącza się
      # automatycznie dla tej gałęzi, bez konfiguracji w ustawieniach repo.
      - name: Deploy na gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
